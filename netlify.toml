[build]
  base    = "deal-data-room"
  command = "npm install --legacy-peer-deps 2>&1 && npm run build 2>&1 && echo '=== LISTING OUTPUT ===' && ls -la .output/ && echo '--- .output/public ---' && ls -la .output/public/ 2>&1 || echo 'NO .output/public' && echo '--- .netlify ---' && ls -la .netlify/ 2>&1"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "22.14.0"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NETLIFY      = "true"

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server"
  status = 200
