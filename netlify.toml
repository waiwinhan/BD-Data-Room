[build]
  base    = "deal-data-room"
  command = "npm run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "22.14.0"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NETLIFY      = "true"
  NPM_FLAGS    = "--legacy-peer-deps"

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server"
  status = 200
