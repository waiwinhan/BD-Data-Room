[build]
  command = "cd deal-data-room && npm install --legacy-peer-deps && npm run build"
  publish = "deal-data-room/.output/public"

[build.environment]
  NODE_VERSION = "22.14.0"
  NODE_OPTIONS  = "--max-old-space-size=4096"
  NETLIFY       = "true"

[functions]
  directory = "deal-data-room/.netlify/functions-internal"

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server"
  status = 200
