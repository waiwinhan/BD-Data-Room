[build]
  base    = "deal-data-room"
  command = "node --version && npm --version && echo '=== STARTING NPM INSTALL ===' && npm install --legacy-peer-deps 2>&1 && echo '=== NPM INSTALL DONE ===' && npm run build 2>&1 && echo '=== BUILD DONE ==='"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "22.14.0"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NETLIFY      = "true"

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server"
  status = 200
